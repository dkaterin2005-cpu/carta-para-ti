<!DOCTYPE html>
<html lang="es">

<head>
	<meta charset="UTF-8">
	<title>Para ti 🤍</title>

	<style>
		:root {
			--fondo: #f9f7f7;
			--contenedor: #ffffff;
			--texto: #333;
			--boton: #d89aa2;
		}

		body.noche {
			--fondo: #1f1f1f;
			--contenedor: #2b2b2b;
			--texto: #eee;
			--boton: #8b5c63;
		}

		body {
			background: var(--fondo);
			font-family: Georgia, serif;
			color: var(--texto);
			transition: all 0.5s ease;
		}

		.contenedor {
			max-width: 720px;
			margin: 50px auto;
			background: var(--contenedor);
			padding: 35px;
			border-radius: 12px;
			box-shadow: 0 10px 25px rgba(0, 0, 0, 0.1);
			animation: aparecer 1s ease;
		}

		@keyframes aparecer {
			from {
				opacity: 0;
				transform: translateY(20px);
			}

			to {
				opacity: 1;
				transform: translateY(0);
			}
		}

		.boton {
			display: block;
			margin: 25px auto;
			padding: 10px 25px;
			border: none;
			background: var(--boton);
			color: white;
			border-radius: 20px;
			cursor: pointer;
		}

		.boton.latido {
			animation: latido 1.4s infinite;
		}

		@keyframes latido {
			0% {
				transform: scale(1);
			}

			50% {
				transform: scale(1.08);
			}

			100% {
				transform: scale(1);
			}
		}

		.oculto {
			display: none;
		}

		h1 {
			text-align: center;
		}

		#textoCarta {
			line-height: 1.8;
			white-space: pre-line;
			margin-top: 20px;
		}

		.modo {
			position: fixed;
			top: 15px;
			right: 15px;
			cursor: pointer;
		}

		.login-sub {
			text-align: center;
			font-style: italic;
			color: #777;
			margin-bottom: 20px;
		}

		.input-wrapper {
			position: relative;
			width: 70%;
			margin: 0 auto;
		}

		.input-wrapper input {
			width: 100%;
			padding: 10px 40px 10px 15px;
			border-radius: 20px;
			border: 1px solid #ccc;
			outline: none;
		}

		.toggle {
			position: absolute;
			right: 15px;
			top: 50%;
			transform: translateY(-50%);
			cursor: pointer;
		}

		.error {
			text-align: center;
			color: #b35a5a;
			font-size: 13px;
			margin-top: 10px;
			display: none;
		}
	</style>
</head>

<body>

	<div class="modo" onclick="modoNoche()">🌙</div>

	<!-- 🔐 LOGIN -->
	<div id="login" class="contenedor">
		<h1>Hay palabras que solo se dicen en silencio…</h1>
		<p class="login-sub">Si estás aquí, es porque aún existimos.</p>

		<div class="input-wrapper">
			<input type="password" id="clave" placeholder="Una fecha que solo tú y yo sabemos">
			<span class="toggle" onclick="verClave()">👁️</span>
		</div>

		<button class="boton" onclick="entrar()">Abrir mi corazón</button>

		<div id="error" class="error">
			No es la clave… pero sigue siendo para ti 🤍
		</div>
	</div>

	<!-- 💌 CARTA -->
	<div id="contenido" class="contenedor oculto">
		<h1>Para ti 🤍</h1>

		<div id="textoCarta"></div>

		<button class="boton latido" onclick="activarSonido()">
			Escuchar la canción 💗
		</button>

		<iframe id="player" width="100%" height="315" class="oculto"
			src="https://www.youtube.com/embed/1XLX42ZKb1A?autoplay=1&mute=1" frameborder="0"
			allow="autoplay; encrypted-media" allowfullscreen>
		</iframe>
	</div>

	<script>
		const CLAVE = "30/05/2022";
		const LEIDA_KEY = "carta_leida";

		const texto = `						Hola, mi niño,
		No imaginas cuánto deseo estar en Bogotá contigo, hablar de nosotros y comenzar desde cero. Sueño con formar nuestro hogar, cumplir nuestros sueños y metas juntos. Sé que no será fácil después de lo que pasó, pero contigo quiero recorrer ese camino, porque eres mi vida y mi razón de ser.
		Te amo con todo mi ser. Tal vez te cueste creerlo, pero eres la persona más importante en mi vida. Eres mi todo, la luz que ilumina mis días y la paz que me acompaña en mis noches.
		Siempre te lo dije: te amaré eternamente. Contarás con mi apoyo y mi compañía, aunque sea desde la distancia, porque verte feliz es mi mayor felicidad. No quiero momentos fugaces, quiero toda una vida contigo. Sueño con la familia que anhelamos, con ver tus ojos reflejados en los nuestros.
		Eres y siempre serás el amor de mi vida, esa persona única que me marcó para siempre. Me duele no poder abrazarte como deseo, pero mi corazón late con fuerza cada vez que pienso en ti. Las noches sin tu calor son interminables, y el día que te volví a ver sentí que volvía a respirar. Esa paz que me das es mi refugio, mi hogar.
		Lo que más anhelo es que regreses a mí, que volvamos a enamorarnos como la primera vez. Estoy dispuesta a entregarme sin reservas, a conquistarte de nuevo con la misma ternura que nos unió. Te amo, y si la vida nos da otra oportunidad, prometo darte lo mejor de mí, porque contigo quiero todo: el presente, el futuro y la eternidad.
		Cada noche que hemos compartido me ha hecho inmensamente feliz, aunque a veces digas que no significa nada. Para mí sí lo significa: sentir tu cariño, tu paz, tu presencia. Cuando me preguntaste si lloraba y respondí que no, en realidad sí lo hacía… porque no podía decirte cuánto te extraño y cuánto te amo. He soñado tantas veces con este momento, con volver a tenerte cerca.
		Mi niño, algo sí te digo: te amo, y daría todo por estar otra vez a tu lado.
		Como dijo Hache cuando le preguntaron por qué quería volver con ella: “Porque de los miles de amores que tendrás en la vida, solo hay uno bueno, que te marca y se te queda clavado tan fuerte, pero tan fuerte, que no hay manera de sacarlo”.
				Y como dice la canción: “Pase lo que pase yo te esperaré, y nos sentaremos juntos frente al mar, y de tu mano volveré a caminar. Aunque se pase toda mi vida, yo te esperaré”.
				Siento que me arrancaron un pedazo del alma. Si te vas, no queda nada… solo un corazón sin vida que, desde tu partida, se quedó gritando a media voz. La vida se me va porque no estoy contigo, la luna se apaga si no está tu cariño. 


`;

		let i = 0;
		let escribiendo = false;

		// 🔐 ENTRAR
		function entrar() {
			const claveIngresada = document.getElementById("clave").value;
			const error = document.getElementById("error");

			if (claveIngresada === CLAVE) {
				error.style.display = "none";
				mostrarCarta();
			} else {
				error.style.display = "block";
			}
		}

		// 💌 MOSTRAR CARTA
		function mostrarCarta() {
			document.getElementById("login").style.display = "none";
			document.getElementById("contenido").style.display = "block";

			// Reiniciar texto y animación
			i = 0;
			escribiendo = true;
			document.getElementById("textoCarta").innerHTML = "";
			escribirTexto();
		}

		// ✍️ EFECTO ESCRITURA
		function escribirTexto() {
			if (!escribiendo) return;

			if (i < texto.length) {
				const char = texto.charAt(i);
				document.getElementById("textoCarta").innerHTML += char;
				i++;

				let pausa = 35;
				if (char === ",") pausa = 120;
				if (char === ".") pausa = 300;
				if (char === "\n") pausa = 600;

				setTimeout(escribirTexto, pausa);
			}
		}

		// 🎵 ACTIVAR SONIDO
		function activarSonido() {
			const iframe = document.getElementById("player");
			iframe.classList.remove("oculto");
			iframe.src = "https://www.youtube.com/embed/1XLX42ZKb1A?autoplay=1";
		}

		// 🌙 MODO NOCHE
		function modoNoche() {
			document.body.classList.toggle("noche");
		}

		// 👁️ VER CLAVE
		function verClave() {
			const input = document.getElementById("clave");
			input.type = input.type === "password" ? "text" : "password";
		}

		// 🚫 NUNCA ENTRA AUTOMÁTICO
		window.onload = () => {
			document.getElementById("login").style.display = "block";
			document.getElementById("contenido").style.display = "none";
		};
	</script>

</body>

</html>
